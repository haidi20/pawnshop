root = "."
tmp_dir = "tmp"

[build]
  # Perintah build
  bin = "tmp/main.exe"          # Windows: .exe | Linux/macOS: "tmp/main"
  cmd = "go build -o ./tmp/main.exe ."
  delay = 1000                  # delay 1 detik setelah file berubah
  exclude_dir = ["assets", "tmp", "vendor", "testdata", ".git"]
  exclude_file = []
  exclude_regex = ["_test\\.go"]
  exclude_unchanged = false     # PENTING: set false agar selalu rebuild
  follow_symlink = false
  full_bin = ""
  include_dir = []              # Kosongkan, biarkan Air scan semua
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  include_file = []
  kill_delay = "0s"             # Langsung kill process lama
  log = "build-errors.log"
  poll = true                   # PENTING untuk Windows: gunakan polling
  poll_interval = 500           # Check setiap 500ms (lebih responsif)
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[log]
  main_only = false
  time = true

[color]
  app = "magenta"
  build = "yellow"
  main = "cyan"
  runner = "green"
  watcher = "blue"

[misc]
  clean_on_exit = false
